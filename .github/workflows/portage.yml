name: portage

on:
  schedule:
    - cron: '0 1 * * *'
  push:
  pull_request:

env:
  ORG: ghcr.io/ksmanis

permissions:
  contents: read
  packages: write

jobs:
  portage:
    # some boilerplate kept for alignment with build.yml
    strategy:
      fail-fast: false
      matrix:
        target:
          - portage
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build ${{ matrix.target }}
        uses: ./.github/actions/container_build
        with:
          target: ${{ matrix.target }}
          dockerhub_username: ${{ github.actor }}
          dockerhub_password: ${{ secrets.GITHUB_TOKEN }}
